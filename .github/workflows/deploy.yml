name: Deploy to GitHub Pages

# Publishes the static app (index.html + src/) to GitHub Pages on every push to
# main — but only after the data validator and the test suite pass, so a broken
# build can never go live. One-time setup: in the repo, Settings -> Pages ->
# "Build and deployment" -> Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Never publish a broken build: data + tests must pass first.
      - name: Install dev dependencies
        run: npm ci
      - name: Validate the catalog data
        run: node validate.js
      - name: Run the test suite
        run: npm test

      # Stage only the static app — not test/, docs, or config.
      - name: Stage the static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r src _site/
          # BuildMyMTB's own catalog data. The MTB catalog was split out of
          # src/compat.js into data/mtb.js on 2026-07-23 (compat.js is the engine
          # now). `cp -r src` does NOT cover it — without the two lines below the
          # FLAGSHIP page 404s on its catalog in production while working fine
          # locally. index.html tags data/mtb.js BEFORE src/compat.js.
          mkdir -p _site/data
          cp data/mtb.js _site/data/
          cp CNAME _site/   # custom domain (buildmymtb.com) — Pages drops it if absent from the artifact
          # Root legal pages — same trap as CNAME: not served unless staged explicitly.
          cp privacy.html _site/
          cp terms.html _site/
          cp affiliate-disclosure.html _site/
          # /about.html (D4, the "About" page; renamed from home.html on Douglas's
          # word 2026-07-20) — same trap: a new root .html silently 404s in
          # production unless it's staged explicitly here. /home.html is the D2c
          # family front door (Douglas's domain call, 2026-07-20 — it replaced the
          # brief About-redirect stub at that path).
          cp about.html _site/
          cp home.html _site/
          # Kit Builder page (separate /KitBuilder route — a real directory index that
          # shares src/ via ../src). Same staging trap: not served unless copied.
          mkdir -p _site/KitBuilder
          cp KitBuilder/index.html _site/KitBuilder/
          # BuildMyBMX page (root-level bmx.html, live 2026-07-17) — needs its data
          # file staged too; src/compat-bmx.js already ships via `cp -r src` above.
          cp bmx.html _site/
          mkdir -p _site/data
          cp data/bmx.js _site/data/
          # BuildMyRoadbike (road.html) + BuildMyEMTB (emtb.html) — LIVE on Douglas's
          # flip word 2026-07-20 ("do them all at once"). Each needs its data file;
          # src/compat-road.js and src/schema-emtb.js already ship via `cp -r src`.
          cp road.html _site/
          cp data/road.js _site/data/
          cp emtb.html _site/
          cp data/emtb.js _site/data/
          # BuildMyGravelBike (gravel.html) — LIVE on Douglas's flip word 2026-07-21.
          cp gravel.html _site/
          cp data/gravel.js _site/data/

      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
